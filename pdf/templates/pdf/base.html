{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}PDF Tools{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.7.1/css/all.css">
        {% block head %}{% endblock %}
    </head>
    <body>
        <nav class="navbar navbar-dark" style="background-color:#00888d;">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'pdf-home' %}">
                    <i class="fas fa-file-pdf"></i> PDF Tools
                </a>
                <div>
                    {% if user.is_authenticated %}
                        <form action="{% url 'oidc_logout' %}" method="post" class="d-inline">{% csrf_token %}
                            <button type="submit" class="btn btn-warning btn-sm">Logout {{ user.username }}</button>
                        </form>
                    {% endif %}
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            {% block body %}{% endblock %}
        </div>

        <script src="https://code.jquery.com/jquery-3.4.1.min.js" integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo=" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
        {% block javascript %}{% endblock %}
    </body>
</html>
