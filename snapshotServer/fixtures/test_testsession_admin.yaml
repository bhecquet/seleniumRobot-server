# Minimal dataset for TestTestSessionAdmin
# The admin filters test sessions by application (version -> application) and by environment,
# and the TestCaseFilterForSession lists the test cases recorded in the sessions.
# Provided data:
#   - Applications 1 (myapp) and 2 (myapp2)
#   - Version 1 -> myapp, Version 2 -> myapp2
#   - Environments 1 (DEV) and 2 (PROD)
#   - 5 test cases: test1/test2/test3/'test login' on myapp, test1app2 on myapp2
#   - 3 sessions:
#       * session 1 : version 1 (myapp) / DEV
#       * session 2 : version 1 (myapp) / PROD
#       * session 3 : version 2 (myapp2) / DEV
#   - TestCaseInSession links:
#       * session 1 -> test1, test2
#       * session 2 -> test3, 'test login'
#       * session 3 -> test1app2
# Applications 1 and environment 1 are saved in setUp so their 'can_view_*' permissions are generated.

-   model: snapshotServer.application
    pk: 1
    fields: {name: myapp}
-   model: snapshotServer.application
    pk: 2
    fields: {name: myapp2}

-   model: snapshotServer.version
    pk: 1
    fields: {application: 1, name: '2.4'}
-   model: snapshotServer.version
    pk: 2
    fields: {application: 2, name: '1.0'}

-   model: snapshotServer.testenvironment
    pk: 1
    fields: {name: DEV}
-   model: snapshotServer.testenvironment
    pk: 2
    fields: {name: PROD}

-   model: snapshotServer.testcase
    pk: 1
    fields: {name: test1, application: 1}
-   model: snapshotServer.testcase
    pk: 2
    fields: {name: test2, application: 1}
-   model: snapshotServer.testcase
    pk: 3
    fields: {name: test3, application: 1}
-   model: snapshotServer.testcase
    pk: 4
    fields: {name: test login, application: 1}
-   model: snapshotServer.testcase
    pk: 5
    fields: {name: test1app2, application: 2}

-   model: snapshotServer.testsession
    pk: 1
    fields: {sessionId: '1234', version: 1, date: '2017-05-05T11:16:09+00:00', browser: firefox, environment: 1, ttl: '0'}
-   model: snapshotServer.testsession
    pk: 2
    fields: {sessionId: '1235', version: 1, date: '2017-05-05T11:16:09+00:00', browser: firefox, environment: 2, ttl: '0'}
-   model: snapshotServer.testsession
    pk: 3
    fields: {sessionId: '1236', version: 2, date: '2017-05-05T11:16:09+00:00', browser: firefox, environment: 1, ttl: '0'}

-   model: snapshotServer.testcaseinsession
    pk: 1
    fields: {testCase: 1, session: 1}
-   model: snapshotServer.testcaseinsession
    pk: 2
    fields: {testCase: 2, session: 1}
-   model: snapshotServer.testcaseinsession
    pk: 3
    fields: {testCase: 3, session: 2}
-   model: snapshotServer.testcaseinsession
    pk: 4
    fields: {testCase: 4, session: 2}
-   model: snapshotServer.testcaseinsession
    pk: 5
    fields: {testCase: 5, session: 3}
