# Minimal dataset for TestStepReferenceAdmin
# The admin filters StepReference by application (version -> application) and environment,
# and TestCaseFilter lists the test cases referenced by step references.
# Provided step references:
#   - StepReference 1 : testCase 5 (test1app2) / version 2 (myapp2) / PROD
#   - StepReference 2 : testCase 1 (test1)     / version 1 (myapp)  / PROD
#   - StepReference 3 : testCase 1 (test1)     / version 1 (myapp)  / PROD
# Applications 1/2, versions 1/2 and environments 1/2 are provided so filtering is meaningful.
# Application 1 and environment 1 are saved in setUp so their 'can_view_*' permissions are generated.

-   model: snapshotServer.application
    pk: 1
    fields: {name: myapp}
-   model: snapshotServer.application
    pk: 2
    fields: {name: myapp2}

-   model: snapshotServer.version
    pk: 1
    fields: {application: 1, name: '2.4'}
-   model: snapshotServer.version
    pk: 2
    fields: {application: 2, name: '1.0'}

-   model: snapshotServer.testenvironment
    pk: 1
    fields: {name: DEV}
-   model: snapshotServer.testenvironment
    pk: 2
    fields: {name: PROD}

-   model: snapshotServer.teststep
    pk: 1
    fields: {name: Step 1}

-   model: snapshotServer.testcase
    pk: 1
    fields: {name: test1, application: 1}
-   model: snapshotServer.testcase
    pk: 5
    fields: {name: test1app2, application: 2}

-   model: snapshotServer.stepreference
    pk: 1
    fields: {testStep: 1, testCase: 5, version: 2, environment: 2, image: documents/test_Image1.png}
-   model: snapshotServer.stepreference
    pk: 2
    fields: {testStep: 1, testCase: 1, version: 1, environment: 2, image: documents/test_Image1.png}
-   model: snapshotServer.stepreference
    pk: 3
    fields: {testStep: 1, testCase: 1, version: 1, environment: 2, image: documents/test_Image1.png}
