# Minimal dataset for TestViewsetStepResult
# POST uses {'step': N, 'testCase': M} where testCase is a TestCaseInSession pk.
# Permission resolves application/environment through:
#   TestCaseInSession(M) -> session -> version -> application
#   TestCaseInSession(M) -> session -> environment
# The tests reference by pk: StepResult 1/5/6, TestStep 1/2/3/5 (5 = 'Test end'),
# TestCase 1/2/4, TestSession 1/6, TestCaseInSession 1/5.
# Applications 1/2 and environments 1/2 are required so their 'can_view_*' permissions can be generated.

-   model: snapshotServer.application
    pk: 1
    fields: {name: myapp}
-   model: snapshotServer.application
    pk: 2
    fields: {name: myapp2}
-   model: snapshotServer.version
    pk: 1
    fields: {application: 1, name: '2.4'}
-   model: snapshotServer.testenvironment
    pk: 1
    fields: {name: DEV}
-   model: snapshotServer.testenvironment
    pk: 2
    fields: {name: PROD}

-   model: snapshotServer.testcase
    pk: 1
    fields: {name: test1, application: 1}
-   model: snapshotServer.testcase
    pk: 2
    fields: {name: test2, application: 1}
-   model: snapshotServer.testcase
    pk: 4
    fields: {name: test login, application: 1}

-   model: snapshotServer.teststep
    pk: 1
    fields: {name: Step 1}
-   model: snapshotServer.teststep
    pk: 2
    fields: {name: Login}
-   model: snapshotServer.teststep
    pk: 3
    fields: {name: Logged}
-   model: snapshotServer.teststep
    pk: 5
    fields: {name: Test end}

-   model: snapshotServer.testsession
    pk: 1
    fields:
        sessionId: '1234'
        version: 1
        date: '2017-05-05T11:16:09.184106+01:00'
        browser: firefox
        environment: 1
        compareSnapshot: true
        name: session1
        ttl: '0'  # set to 0 to avoid automatic deletion
-   model: snapshotServer.testsession
    pk: 6
    fields:
        sessionId: '1250'
        version: 1
        date: '2017-05-05T16:16:09.184106+01:00'
        browser: firefox
        environment: 1
        compareSnapshot: true
        name: session1
        ttl: '0'  # set to 0 to avoid automatic deletion

-   model: snapshotServer.testcaseinsession
    pk: 1
    fields:
        name: 'foo'
        testCase: 1
        session: 1
-   model: snapshotServer.testcaseinsession
    pk: 5
    fields:
        testCase: 4
        session: 6

-   model: snapshotServer.stepresult
    pk: 1
    fields:
        step: 1
        testCase: 1
        result: true
-   model: snapshotServer.stepresult
    pk: 5
    fields:
        step: 2
        testCase: 5
        result: true
-   model: snapshotServer.stepresult
    pk: 6
    fields:
        step: 3
        testCase: 5
        result: true
