# Minimal dataset for TestViewsetTestSession
# POST creates a session with {'version': 1, 'environment': 'DEV', ...}.
# Permission resolves application via Version(1).application and environment by name.
# No TestSession row is required (the '405' tests never reach the database).
# Applications 1/2 and environments 1/2 are required so their 'can_view_*' permissions can be generated.

-   model: snapshotServer.application
    pk: 1
    fields: {name: myapp}
-   model: snapshotServer.application
    pk: 2
    fields: {name: myapp2}
-   model: snapshotServer.version
    pk: 1
    fields: {application: 1, name: '2.4'}
-   model: snapshotServer.testenvironment
    pk: 1
    fields: {name: DEV}
-   model: snapshotServer.testenvironment
    pk: 2
    fields: {name: PROD}
