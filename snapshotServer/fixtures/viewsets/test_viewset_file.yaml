# Minimal dataset for TestViewsetFile
# POST uses 'stepResult: 1'; GET/download uses File pk 1..7.
# The permission resolves application/environment through:
#   File(pk) / StepResult(1) -> testCase[TestCaseInSession](1) -> session(1) -> version(1) -> application(1)
#   File(pk) / StepResult(1) -> testCase[TestCaseInSession](1) -> session(1) -> environment(1)
# Applications 1/2 and environments 1/2 are required so their 'can_view_*' permissions can be generated.

-   model: snapshotServer.application
    pk: 1
    fields: {name: myapp}
-   model: snapshotServer.application
    pk: 2
    fields: {name: myapp2}
-   model: snapshotServer.version
    pk: 1
    fields: {application: 1, name: '2.4'}
-   model: snapshotServer.testenvironment
    pk: 1
    fields: {name: DEV}
-   model: snapshotServer.testenvironment
    pk: 2
    fields: {name: PROD}
-   model: snapshotServer.testcase
    pk: 1
    fields:
        name: test1
        application: 1
-   model: snapshotServer.teststep
    pk: 1
    fields: {name: Step 1}
-   model: snapshotServer.testsession
    pk: 1
    fields:
        sessionId: '1234'
        version: 1
        date: '2017-05-05T11:16:09.184106+01:00'
        browser: firefox
        environment: 1
        compareSnapshot: true
        name: session1
        ttl: '0'  # set to 0 to avoid automatic deletion
-   model: snapshotServer.testcaseinsession
    pk: 1
    fields:
        name: 'foo'
        testCase: 1
        session: 1
-   model: snapshotServer.stepresult
    pk: 1
    fields:
        step: 1
        testCase: 1
        result: true

# files need to be copied at the beginning of the test to /media/documents so that they can be used
-   model: snapshotServer.file
    pk: 1
    fields:
        stepResult: 1
        name: test_Image1.png
        file: documents/test_Image1.png
-   model: snapshotServer.file
    pk: 2
    fields:
        stepResult: 1
        file: documents/test.html
-   model: snapshotServer.file
    pk: 3
    fields:
        stepResult: 1
        name: "test_file.txt"
        file: documents/test.txt
-   model: snapshotServer.file
    pk: 4
    fields:
        stepResult: 1
        file: documents/test.avi
-   model: snapshotServer.file
    pk: 5
    fields:
        stepResult: 1
        name: "test.mp4"
        file: documents/test.mp4
-   model: snapshotServer.file
    pk: 6
    fields:
        stepResult: 1
        name: "test.zip"
        file: documents/test.zip
-   model: snapshotServer.file
    pk: 7
    fields:
        stepResult: 1
        name: "test.har"
        file: documents/test.har
