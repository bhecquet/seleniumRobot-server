# Minimal dataset for TestViewsetTestCaseInSession
# POST uses {'session': N, 'testCase': M, 'testSteps': [...]}.
# Permission resolves application/environment through:
#   TestSession(N) -> version -> application  and  TestSession(N) -> environment
# The tests reference by pk / value:
#   - TestCaseInSession 1 (name 'foo') for GET/PATCH
#   - TestCaseInSession 6 (session 7, testCase 4, steps 2/3/4) -> matched, returns id 6
#   - TestCaseInSession 8 (session 8, testCase 2, no steps)    -> matched, returns id 8
#   - sessions 1/7/8, testCases 1/2/4, teststeps 2/3/4
# Applications 1/2 and environments 1/2 are required so their 'can_view_*' permissions can be generated.

-   model: snapshotServer.application
    pk: 1
    fields: {name: myapp}
-   model: snapshotServer.application
    pk: 2
    fields: {name: myapp2}
-   model: snapshotServer.version
    pk: 1
    fields: {application: 1, name: '2.4'}
-   model: snapshotServer.testenvironment
    pk: 1
    fields: {name: DEV}
-   model: snapshotServer.testenvironment
    pk: 2
    fields: {name: PROD}

-   model: snapshotServer.testcase
    pk: 1
    fields: {name: test1, application: 1}
-   model: snapshotServer.testcase
    pk: 2
    fields: {name: test2, application: 1}
-   model: snapshotServer.testcase
    pk: 4
    fields: {name: test login, application: 1}

-   model: snapshotServer.teststep
    pk: 2
    fields: {name: Login}
-   model: snapshotServer.teststep
    pk: 3
    fields: {name: Logged}
-   model: snapshotServer.teststep
    pk: 4
    fields: {name: Logged out}

-   model: snapshotServer.testsession
    pk: 1
    fields:
        sessionId: '1234'
        version: 1
        date: '2017-05-05T11:16:09.184106+01:00'
        browser: firefox
        environment: 1
        compareSnapshot: true
        name: session1
        ttl: '0'  # set to 0 to avoid automatic deletion
-   model: snapshotServer.testsession
    pk: 7
    fields:
        sessionId: '1251'
        version: 1
        date: '2017-05-06T17:16:09.184106+01:00'
        browser: firefox
        environment: 1
        compareSnapshot: true
        name: session1
        ttl: '0'  # set to 0 to avoid automatic deletion
-   model: snapshotServer.testsession
    pk: 8
    fields:
        sessionId: '1252'
        version: 1
        date: '2017-05-06T22:16:09.184106+01:00'
        browser: firefox
        environment: 1
        compareSnapshot: true
        name: session1
        ttl: '0'  # set to 0 to avoid automatic deletion

-   model: snapshotServer.testcaseinsession
    pk: 1
    fields:
        name: 'foo'
        testCase: 1
        session: 1
-   model: snapshotServer.testcaseinsession
    pk: 6
    fields:
        testCase: 4
        session: 7
        testSteps: [2, 3, 4]
-   model: snapshotServer.testcaseinsession
    pk: 8
    fields:
        testCase: 2
        session: 8
        testSteps: []
