# Minimal dataset for TestPictureView (test_picture_view.py)
#
# The test creates a lot of data dynamically in setUp / test bodies (new sessions,
# TestCaseInSession, StepResult and Snapshot). From the fixture it only READS:
#
#   setUp:
#     - Application 1 (myapp) / 2 (myapp2)     -> saved to (re)generate 'can_view_results_*' permissions
#     - TestEnvironment 1 (DEV) / 2 (PROD)     -> saved to (re)generate 'can_view_results_*' permissions
#     - TestCase 1, TestStep 1, Version 1
#     - Snapshot 1 (initialRefSnapshot, no refSnapshot) -> its chain StepResult 1 / TestCaseInSession 1 / TestSession 1
#     - TestSession 10/11, TestCaseInSession 9/10, StepResult 11/12 (other env / other browser)
#
#   test bodies:
#     - TestCaseInSession 100 (-> StepResult 2 -> Snapshot 2 referencing Snapshot 1) : the "reference + step snapshot" case
#     - TestCaseInSession 3  (-> StepResult 3 -> Snapshot 3, a reference)             : make/remove ref on an existing reference
#     - TestCaseInSession 4  (-> StepResult 4 -> Snapshot 4 referencing Snapshot 3)  : remove ref when not a reference
#     - TestStep 2 : used with step_id=2 in tests expecting an empty capture list (get_object_or_404 needs it to exist)
#
# The reference lookup matches on testCase name / version / environment / browser, so the fixture
# sessions must all share Version 1 and the relevant environment/browser characteristics.

-   model: snapshotServer.application
    pk: 1
    fields: {name: myapp}
-   model: snapshotServer.application
    pk: 2
    fields: {name: myapp2}
-   model: snapshotServer.version
    pk: 1
    fields: {application: 1, name: '2.4'}
-   model: snapshotServer.testenvironment
    pk: 1
    fields: {name: DEV}
-   model: snapshotServer.testenvironment
    pk: 2
    fields: {name: PROD}

-   model: snapshotServer.testcase
    pk: 1
    fields: {name: test1, application: 1}
-   model: snapshotServer.testcase
    pk: 3
    fields: {name: test3, application: 1}

-   model: snapshotServer.teststep
    pk: 1
    fields: {name: Step 1}
-   model: snapshotServer.teststep
    pk: 2
    fields: {name: Step 2}

# session1 : owner of the initial reference snapshot (Snapshot 1)
-   model: snapshotServer.testsession
    pk: 1
    fields:
        sessionId: '1234'
        version: 1
        date: '2017-05-05T11:16:09.184106+01:00'
        browser: firefox
        environment: 1
        compareSnapshot: true
        name: session1
        ttl: '0'
# session2 : owner of the step snapshot (Snapshot 2) referencing Snapshot 1
-   model: snapshotServer.testsession
    pk: 2
    fields:
        sessionId: '1235'
        version: 1
        date: '2017-05-05T12:16:09.184106+01:00'
        browser: firefox
        environment: 1
        compareSnapshot: true
        name: session2
        ttl: '0'
# session4 / session5 : reference (Snapshot 3) and its following snapshot (Snapshot 4)
-   model: snapshotServer.testsession
    pk: 4
    fields:
        sessionId: '1234bis'
        version: 1
        date: '2017-05-05T14:16:09.184106+01:00'
        browser: firefox
        environment: 1
        compareSnapshot: true
        ttl: '0'
-   model: snapshotServer.testsession
    pk: 5
    fields:
        sessionId: '1235bis'
        version: 1
        date: '2017-05-05T15:16:09.184106+01:00'
        browser: firefox
        environment: 1
        compareSnapshot: true
        name: session1
        ttl: '0'
# session_other_env : same version/browser as session1 but environment PROD
-   model: snapshotServer.testsession
    pk: 10
    fields:
        sessionId: '1254'
        version: 1
        date: '2017-05-05T12:16:09.184106+01:00'
        browser: firefox
