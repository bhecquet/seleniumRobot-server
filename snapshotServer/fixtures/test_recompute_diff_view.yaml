# Minimal dataset for TestRecomputeDiffView
# recompute is called with a Snapshot pk.
#   - snapshot 2 has a refSnapshot -> diff computed -> 200
#   - snapshot 1 has no refSnapshot -> 304
# Permission resolves application/environment through:
#   Snapshot -> stepResult -> testCase[TestCaseInSession] -> session -> version -> application / environment
# Applications 1/2 and environments 1/2 are required so their 'can_view_*' permissions can be generated.

-   model: snapshotServer.application
    pk: 1
    fields: {name: myapp}
-   model: snapshotServer.application
    pk: 2
    fields: {name: myapp2}
-   model: snapshotServer.version
    pk: 1
    fields: {application: 1, name: '2.4'}
-   model: snapshotServer.testenvironment
    pk: 1
    fields: {name: DEV}
-   model: snapshotServer.testenvironment
    pk: 2
    fields: {name: PROD}
-   model: snapshotServer.testcase
    pk: 1
    fields: {name: test1, application: 1}
-   model: snapshotServer.teststep
    pk: 1
    fields: {name: Step 1}

-   model: snapshotServer.testsession
    pk: 1
    fields:
        sessionId: '1234'
        version: 1
        date: '2017-05-05T11:16:09.184106+01:00'
        browser: firefox
        environment: 1
        compareSnapshot: true
        name: session1
        ttl: '0'
-   model: snapshotServer.testsession
    pk: 2
    fields:
        sessionId: '1235'
        version: 1
        date: '2017-05-05T12:16:09.184106+01:00'
        browser: firefox
        environment: 1
        compareSnapshot: true
        name: session2
        ttl: '0'

-   model: snapshotServer.testcaseinsession
    pk: 1
    fields:
        name: 'foo'
        testCase: 1
        session: 1
-   model: snapshotServer.testcaseinsession
    pk: 100
    fields:
        testCase: 1
        session: 2
        testSteps: [1]

-   model: snapshotServer.stepresult
    pk: 1
    fields:
        step: 1
        testCase: 1
        result: true
-   model: snapshotServer.stepresult
    pk: 2
    fields:
        step: 1
        testCase: 100
        result: true

-   model: snapshotServer.snapshot
    pk: 1
    fields:
        stepResult: 1
        image: documents/test_Image1.png
-   model: snapshotServer.snapshot
    pk: 2
    fields:
        stepResult: 2
        image: documents/test_Image1Mod.png
        refSnapshot: 1
