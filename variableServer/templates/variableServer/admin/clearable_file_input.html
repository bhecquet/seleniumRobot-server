<p class="file-upload">
    {% if widget.is_initial %}{{ widget.initial_text }}: <a href="{{ widget.value.instance.get_api_url }}">{{ widget.value }}</a>{% if not widget.required %}
    <br>
    <span class="clearable-file-input">
        <label style="font-weight: bold; color: #696969" for="{{ widget.checkbox_id }}">{{ widget.clear_checkbox_label }}</label>{% endif %}
        <input type="checkbox" name="{{ widget.checkbox_name }}" id="{{ widget.checkbox_id }}"{% if widget.attrs.disabled %} disabled{% endif %}{% if widget.attrs.checked %} checked{% endif %}>

    </span>
    <br>
    {{ widget.input_text }}:{% endif %}
    <input type="{{ widget.type }}" name="{{ widget.name }}"{% include "django/forms/widgets/attrs.html" %}>
</p>
